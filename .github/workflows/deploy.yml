name: Deploy to Cloud Run

# Builds the image, pushes it to Artifact Registry, and deploys to Cloud Run
# on every push to master. Authentication is keyless via Workload Identity
# Federation — no service-account JSON key is stored in GitHub.
#
# Required repo secrets (printed by gcp-bootstrap.sh):
#   WIF_PROVIDER    full resource name of the workload identity provider
#   DEPLOY_SA_EMAIL email of the gh-deployer service account

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  PROJECT_ID: youtube-downloader-501718
  REGION: us-central1
  AR_REPO: apps
  SERVICE: youtube-downloader

permissions:
  contents: read
  id-token: write # required to mint the GitHub OIDC token for WIF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless, WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE}:${GITHUB_SHA}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 2Gi \
            --no-cpu-throttling \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 20 \
            --timeout 900 \
            --set-env-vars "CACHE_DIR=/tmp/cache,MAX_CACHE_GB=1,MAX_CONCURRENT_DOWNLOADS=2,DOWNLOAD_TIMEOUT_SECS=900" \
            --set-secrets "AUTH_TOKEN=AUTH_TOKEN:latest"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format='value(status.url)'
